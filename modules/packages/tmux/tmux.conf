# ── Core settings ─────────────────────────────────────────────────────────────
set  -g default-terminal "tmux-256color"
set  -g base-index       1
setw -g pane-base-index  1
set  -g status-keys      emacs
setw -g mode-keys        vi
set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  12
set  -s escape-time       500
set  -g history-limit     2000
set  -gq allow-passthrough on
set  -g visual-activity    off

# ── Prefix: Ctrl+x instead of Ctrl+b ──────────────────────────────────────────
unbind C-b
set  -g prefix C-x
bind C-x send-prefix

# ── Alt key bindings — mirror every default Ctrl+b <key> binding ───────────────

# Panes
bind -n 'M-"'  split-window -v          # C-b "    split vertical
bind -n 'M-%'  split-window -h          # C-b %    split horizontal
bind -n 'M-!'  break-pane               # C-b !    break pane into window
bind -n 'M-x'  kill-pane                # C-b x    kill pane (with confirm)
bind -n 'M-z'  resize-pane -Z           # C-b z    zoom/unzoom pane
bind -n 'M-o'  select-pane -t :.+       # C-b o    next pane
bind -n 'M-;'  last-pane                # C-b ;    last active pane
bind -n 'M-q'  display-panes            # C-b q    show pane numbers
bind -n 'M-m'  select-pane -m           # C-b m    mark pane
bind -n 'M-M'  select-pane -M           # C-b M    unmark pane
bind -n 'M-{'  swap-pane -U             # C-b {    swap pane up
bind -n 'M-}'  swap-pane -D             # C-b }    swap pane down

# Pane navigation
bind -n 'M-h'  select-pane -L           # C-b Left
bind -n 'M-j'  select-pane -D           # C-b Down
bind -n 'M-k'  select-pane -U           # C-b Up
bind -n 'M-l'  select-pane -R           # C-b Right

# Pane resize
bind -n 'M-Up'    resize-pane -U 5
bind -n 'M-Down'  resize-pane -D 5
bind -n 'M-Left'  resize-pane -L 5
bind -n 'M-Right' resize-pane -R 5

# Windows
bind -n 'M-c'  new-window               # C-b c    new window
bind -n 'M-n'  next-window              # C-b n    next window
bind -n 'M-p'  previous-window          # C-b p    previous window
bind -n 'M-0'  last-window              # C-b l    last window
bind -n 'M-&'  kill-window              # C-b &    kill window
bind -n 'M-,'  command-prompt -I "#W" "rename-window '%%'"   # C-b ,
bind -n 'M-w'  choose-tree -w           # C-b w    window tree picker
bind -n 'M-f'  command-prompt "find-window -N '%%'"          # C-b f
bind -n 'M-.'  command-prompt "move-window -t '%%'"          # C-b .

# Window selection by number
bind -n 'M-1' select-window -t 1
bind -n 'M-2' select-window -t 2
bind -n 'M-3' select-window -t 3
bind -n 'M-4' select-window -t 4
bind -n 'M-5' select-window -t 5
bind -n 'M-6' select-window -t 6
bind -n 'M-7' select-window -t 7
bind -n 'M-8' select-window -t 8
bind -n 'M-9' select-window -t 9

# Sessions
bind -n 'M-s'  choose-tree -s           # C-b s    session tree picker
bind -n 'M-$'  command-prompt -I "#S" "rename-session '%%'"  # C-b $
bind -n 'M-d'  detach-client            # C-b d    detach
bind -n 'M-D'  choose-client            # C-b D    choose client to detach
bind -n 'M-r'  source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# Copy / scrollback
bind -n 'M-Enter' copy-mode             # C-b [    enter copy mode
bind -n 'M-]'  paste-buffer             # C-b ]    paste
bind -n 'M-='  choose-buffer            # C-b =    choose buffer
bind -n 'M-#'  list-buffers             # C-b #    list buffers
bind -n 'M--'  delete-buffer            # C-b -    delete buffer

# Misc
bind -n 'M-:'  command-prompt           # C-b :    command prompt
bind -n 'M-?'  list-keys                # C-b ?    list all keys
bind -n 'M-~'  show-messages            # C-b ~    show message log
bind -n 'M-i'  display-message          # C-b i    display window info
bind -n 'M-t'  clock-mode               # C-b t    show clock

# ── Theme (must come before status overrides) ──────────────────────────────────
source-file /nix/store/vbln7rm5ikigx17hl8g6rmk60shaj4sf-base16-black-metal.conf

# ── Status bar (after theme so these overrides win) ───────────────────────────
set -g status                on
set -g status-position       top
set -g status-interval       2
set -g status-justify        centre
set -g status-style          bg=default
set -g status-left           " #S "
set -g status-right          " %Y-%m-%d %H:%M "
set -g status-left-length    20
set -g status-right-length   60
set -g status-left-style     none
set -g status-right-style    none

set-window-option -g window-status-style          fg=default,bg=default
set-window-option -g window-status-current-style  fg=colour167,bg=default
set-window-option -g window-status-current-format " • #I:#W "
set-window-option -g window-status-format         " #I:#W "
